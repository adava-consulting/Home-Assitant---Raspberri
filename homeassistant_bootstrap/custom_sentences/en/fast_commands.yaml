language: "en"
intents:
  HassTurnOn:
    data:
      - sentences:
          - "(lights on|all lights on)"
          - "<turn_on_verb> on [all [of] [the]] lights"
          - "<turn_on_verb> [all [of] [the]] lights on"
      - sentences:
          - "<turn_on_verb> on [the] {area} lights"
          - "<turn_on_verb> [the] lights in [the] {area} on"
  HassTurnOff:
    data:
      - sentences:
          - "(lights off|all lights off)"
          - "<turn_off_verb> off [all [of] [the]] lights"
          - "<turn_off_verb> [all [of] [the]] lights off"
          - "shut [all [of] [the]] lights off"
      - sentences:
          - "<turn_off_verb> off [the] {area} lights"
          - "<turn_off_verb> [the] lights in [the] {area} off"
          - "shut [the] {area} lights off"
  BridgeGoodNight:
    data:
      - sentences:
          - "(good night|night mode|bedtime mode|prepare the house for bedtime)"
  BridgeGuestMode:
    data:
      - sentences:
          - "(guest mode|visitors mode|welcome guests)"
expansion_rules:
  turn_on_verb: "(turn|switch)"
  turn_off_verb: "(turn|switch)"
