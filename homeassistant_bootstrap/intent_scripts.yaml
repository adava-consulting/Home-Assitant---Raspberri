BridgeAllLightsOn:
  description: Fast local all-lights on request routed through the bridge.
  async_action: true
  mode: parallel
  speech:
    text: Done.
  action:
    - action: script.send_assist_command_to_bridge
      data:
        command_text: "turn all lights on"
        dry_run: false
        source: "assist_fast_intent:all_on"

