BridgeAllLightsOn:
  description: Fast local all-lights on request routed through the bridge.
  async_action: true
  mode: parallel
  speech:
    text: Done.
  action:
    - action: script.send_command_to_bridge
      data:
        command_text: "turn all lights on"
        dry_run: false

BridgeAllLightsOff:
  description: Fast local all-lights off request routed through the bridge.
  async_action: true
  mode: parallel
  speech:
    text: Done.
  action:
    - action: script.send_command_to_bridge
      data:
        command_text: "turn all lights off"
        dry_run: false

