- id: assist_bridge_command
  alias: Assist Bridge Command
  description: Forwards Assist text commands to the local backend for local-first interpretation.
  triggers:
    - trigger: conversation
      command:
        - "{command_text}"
  actions:
    - variables:
        command_text: "{{ trigger.slots.command_text }}"
    - action: script.send_command_to_bridge
      data:
        command_text: "{{ command_text }}"
        dry_run: false
      response_variable: bridge_result
    - variables:
        assistant_reply: >-
          {% set result = bridge_result if bridge_result is defined and bridge_result is mapping else {} %}
          {{ result.get("assistant_response", "I had trouble processing that command.") }}
        spoken_reply_enabled: "{{ is_state('input_boolean.assist_voice_reply_enabled', 'on') }}"
    - variables:
        final_assistant_reply: >-
          {% if spoken_reply_enabled and (assistant_reply | trim | length > 0) %}
          {{ assistant_reply }}
          {% else %}
          {{ '' }}
          {% endif %}
    - set_conversation_response: "{{ final_assistant_reply }}"
  mode: single
