services:
  openwakeword:
    image: rhasspy/wyoming-openwakeword:latest
    container_name: wyoming-openwakeword
    restart: unless-stopped
    command:
      - --uri
      - tcp://0.0.0.0:10400
      - --preload-model
      - ${WAKE_WORD_MODEL:-hey_jarvis}
    ports:
      - "10400:10400"

  whisper:
    image: rhasspy/wyoming-whisper:latest
    container_name: wyoming-whisper
    restart: unless-stopped
    command:
      - --model
      - ${WHISPER_MODEL:-base-int8}
      - --language
      - ${WHISPER_LANGUAGE:-en}
      - --beam-size
      - ${WHISPER_BEAM_SIZE:-1}
      - --cpu-threads
      - ${WHISPER_CPU_THREADS:-4}
      - --initial-prompt
      - "${WHISPER_INITIAL_PROMPT:-Turn on the lights. Turn off the lights. Turn on the studio lights. Turn off the studio lights. Set the studio lights to blue. Set the studio lights to 50 percent brightness.}"
      - --vad-filter
      - --vad-min-speech-ms
      - ${WHISPER_VAD_MIN_SPEECH_MS:-200}
      - --vad-min-silence-ms
      - ${WHISPER_VAD_MIN_SILENCE_MS:-700}
      - --uri
      - tcp://0.0.0.0:10300
      - --data-dir
      - /data
      - --download-dir
      - /data
    ports:
      - "10300:10300"
    volumes:
      - ./whisper-data:/data

  piper:
    image: rhasspy/wyoming-piper:latest
    container_name: wyoming-piper
    restart: unless-stopped
    command:
      - --voice
      - ${PIPER_VOICE:-en_US-lessac-medium}
      - --uri
      - tcp://0.0.0.0:10200
      - --data-dir
      - /data
      - --download-dir
      - /data
    ports:
      - "10200:10200"
    volumes:
      - ./piper-data:/data
