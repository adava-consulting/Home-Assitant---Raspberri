services:
  openwakeword:
    image: rhasspy/wyoming-openwakeword:latest
    container_name: wyoming-openwakeword
    restart: unless-stopped
    command:
      - --uri
      - tcp://0.0.0.0:10400
      - --threshold
      - ${WAKE_WORD_THRESHOLD:-0.17}
      - --trigger-level
      - ${WAKE_WORD_TRIGGER_LEVEL:-1}
      - --refractory-seconds
      - ${WAKE_WORD_REFRACTORY_SECONDS:-8.0}
      - --preload-model
      - ${WAKE_WORD_MODEL:-hey_jarvis}
    ports:
      - "10400:10400"

  whisper:
    build:
      context: ./whisper_patch
      dockerfile: Dockerfile
    image: ha-local/wyoming-whisper:patched
    container_name: wyoming-whisper
    restart: unless-stopped
    command:
      - --model
      - ${WHISPER_MODEL:-base-int8}
      - --language
      - ${WHISPER_LANGUAGE:-en}
      - --beam-size
      - ${WHISPER_BEAM_SIZE:-3}
      - --cpu-threads
      - ${WHISPER_CPU_THREADS:-4}
      - --initial-prompt
      - "${WHISPER_INITIAL_PROMPT:-Home automation voice commands. Transcribe speech literally and briefly. If the audio is unclear, prefer no text instead of guessing. Do not repeat phrases. Common commands: turn on the room lights. turn off the room lights. turn on the studio lights. turn off the studio lights. turn on the studio lights to 50 percent brightness. set the studio lights to 50 percent brightness. change the studio lights to blue. set the studio lights to blue. change the color of the studio lights to blue.}"
      - --vad-min-speech-ms
      - ${WHISPER_VAD_MIN_SPEECH_MS:-200}
      - --vad-min-silence-ms
      - ${WHISPER_VAD_MIN_SILENCE_MS:-700}
      - --uri
      - tcp://0.0.0.0:10300
      - --data-dir
      - /data
      - --download-dir
      - /data
    ports:
      - "10300:10300"
    volumes:
      - ./whisper-data:/data

  piper:
    image: rhasspy/wyoming-piper:latest
    container_name: wyoming-piper
    restart: unless-stopped
    command:
      - --voice
      - ${PIPER_VOICE:-en_US-lessac-medium}
      - --uri
      - tcp://0.0.0.0:10200
      - --data-dir
      - /data
      - --download-dir
      - /data
    ports:
      - "10200:10200"
    volumes:
      - ./piper-data:/data
